services:
  app:
    build:
      context: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NOTES_DATA_ROOT: /app/runtime-data
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-secret}
      SESSION_SECURE: ${SESSION_SECURE:-false}
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: ${LOGIN_RATE_LIMIT_MAX_ATTEMPTS:-8}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-900}
      BACKUP_SNAPSHOT_INTERVAL_SECONDS: ${BACKUP_SNAPSHOT_INTERVAL_SECONDS:-900}
      BACKUP_SNAPSHOT_KEEP_COUNT: ${BACKUP_SNAPSHOT_KEEP_COUNT:-14}
    volumes:
      - notes:/app/runtime-data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) { process.exit(1); } }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backup-snapshot:
    build:
      context: .
    depends_on:
      app:
        condition: service_healthy
    environment:
      NOTES_DATA_ROOT: /app/runtime-data
      BACKUP_SNAPSHOT_INTERVAL_SECONDS: ${BACKUP_SNAPSHOT_INTERVAL_SECONDS:-900}
      BACKUP_SNAPSHOT_KEEP_COUNT: ${BACKUP_SNAPSHOT_KEEP_COUNT:-14}
    volumes:
      - notes:/app/runtime-data
    command: ["node", "src/backup-snapshot.js", "watch"]
    restart: unless-stopped

  duplicati:
    image: lscr.io/linuxserver/duplicati:latest
    depends_on:
      app:
        condition: service_healthy
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Etc/UTC}
      SETTINGS_ENCRYPTION_KEY: ${DUPLICATI_SETTINGS_ENCRYPTION_KEY:-change-this-settings-key}
      DUPLICATI__WEBSERVICE_PASSWORD: ${DUPLICATI_WEBSERVICE_PASSWORD:-change-this-web-password}
      CLI_ARGS: ${DUPLICATI_CLI_ARGS:-}
    volumes:
      - duplicati-config:/config
      - duplicati-storage:/backups
      - notes:/source:ro
    ports:
      - "${DUPLICATI_PORT:-8200}:8200"
    restart: unless-stopped

volumes:
  notes:
  duplicati-config:
  duplicati-storage: