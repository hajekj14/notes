services:
  app:
    build:
      context: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      NOTES_DATA_ROOT: /app/runtime-data
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-secret}
      SESSION_SECURE: ${SESSION_SECURE:-false}
    volumes:
      - ./runtime-data:/app/runtime-data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) { process.exit(1); } }).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rclone-sync:
    image: rclone/rclone:latest
    profiles:
      - sync
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./runtime-data:/data
    entrypoint:
      - /bin/sh
      - -c
    command: >
      mkdir -p /data/sync &&
      if [ ! -f /data/sync/rclone.conf ]; then
        echo "Missing /data/sync/rclone.conf. Copy data/config/rclone.conf.example first." >&2;
        exit 1;
      fi;
      while true; do
        rclone sync /data gdrive:pocket-notes --config /data/sync/rclone.conf --exclude 'sync/**' --create-empty-src-dirs;
        sleep ${RCLONE_SYNC_INTERVAL:-900};
      done